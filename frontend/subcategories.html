<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestión de Subcategorías</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a href="dashboard.html" class="navbar-brand">← Volver</a>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>
<body class="bg-light">
  <div class="container mt-4">
    <h1 class="mb-4">Gestión de Subcategorías</h1>

    <form id="subcategory-form" class="mb-4">
      <div class="row g-3">
        <div class="col-md-4">
          <input type="text" id="name" class="form-control" placeholder="Nombre" required />
        </div>
        <div class="col-md-4">
          <input type="text" id="description" class="form-control" placeholder="Descripción" required />
        </div>
        <div class="col-md-4">
          <select id="category" class="form-select" required>
            <option value="">Seleccione una categoría</option>
          </select>
        </div>
        <div class="col-12">
          <button class="btn btn-success" type="submit">Crear Subcategoría</button>
        </div>
      </div>
    </form>

    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Categoría</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="subcategory-table-body"></tbody>
    </table>
  </div>

  <!-- Modal de edición -->
  <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <form id="edit-form" class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editModalLabel">Editar Subcategoría</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-id">
          <div class="mb-3">
            <label for="edit-name" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="edit-name" required>
          </div>
          <div class="mb-3">
            <label for="edit-description" class="form-label">Descripción</label>
            <input type="text" class="form-control" id="edit-description" required>
          </div>
          <div class="mb-3">
            <label for="edit-category" class="form-label">Categoría</label>
            <select id="edit-category" class="form-select" required>
              <option value="">Seleccione una categoría</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-primary">Actualizar</button>
        </div>
      </form>
    </div>
  </div>
<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="./js/subcategories.js"></script>

</body>
</html>
