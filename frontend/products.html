<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Productos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a href="dashboard.html" class="navbar-brand">← Volver</a>
      <button class="btn btn-outline-light btn-sm" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>
<body class="bg-light">

  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3">Gestión de Productos</h1>
      <div>
        <button id="openModalButton" class="btn btn-success me-2" onclick="openNewProductModal()">
          + Agregar Producto
        </button>
      </div>
    </div>

    <table class="table table-bordered table-striped align-middle">
      <thead class="table-dark">
        <tr>
          <th>Nombre</th>
          <th>Descripción</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Categoría</th>
          <th>Subcategoría</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="productTableBody"></tbody>
    </table>

    <!-- Modal para Agregar / Editar Producto -->
    <div class="modal fade" id="productModal" tabindex="-1" aria-labelledby="productModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg">
        <form id="productForm" class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="productModalLabel">Agregar Producto</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="productId">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input type="text" id="name" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Descripción</label>
                <input type="text" id="description" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Precio</label>
                <input type="number" id="price" class="form-control" step="0.01" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Stock</label>
                <input type="number" id="stock" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Categoría</label>
                <select id="categorySelect" class="form-select" required></select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Subcategoría</label>
                <select id="subcategorySelect" class="form-select" required></select>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/products.js"></script>
</body>
</html>
